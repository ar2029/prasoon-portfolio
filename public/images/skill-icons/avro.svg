<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Apache Avro - schema / stacked records icon -->
  <!-- Record rows -->
  <rect x="2" y="3" width="20" height="4" rx="1.5" fill="#0B6396"/>
  <rect x="2" y="10" width="20" height="4" rx="1.5" fill="#0B6396" opacity="0.75"/>
  <rect x="2" y="17" width="20" height="4" rx="1.5" fill="#0B6396" opacity="0.5"/>
  <!-- Schema dividers inside top row -->
  <line x1="9" y1="3" x2="9" y2="7" stroke="#E8F4FD" stroke-width="1" opacity="0.6"/>
  <line x1="16" y1="3" x2="16" y2="7" stroke="#E8F4FD" stroke-width="1" opacity="0.6"/>
  <line x1="9" y1="10" x2="9" y2="14" stroke="#E8F4FD" stroke-width="1" opacity="0.5"/>
  <line x1="16" y1="10" x2="16" y2="14" stroke="#E8F4FD" stroke-width="1" opacity="0.5"/>
</svg>
